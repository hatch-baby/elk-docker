name: Build and Push ELK Image to ECR

on:
  push:
    tags:
      - 'elk-*'

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-west-2

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push image
        env:
          ECR_REPOSITORY: 966878126306.dkr.ecr.us-west-2.amazonaws.com/elk
          IMAGE_TAG: ${{ github.ref_name }}
        run: |
          docker build -t $ECR_REPOSITORY:$IMAGE_TAG \
            --build-arg GEOLITE_ACCOUNT_ID=${{ secrets.GEOLITE_ACCOUNT_ID }} \
            --build-arg GEOLITE_LICENSE_KEY=${{ secrets.GEOLITE_LICENSE_KEY }} .
          docker push $ECR_REPOSITORY:$IMAGE_TAG
