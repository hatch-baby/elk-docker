# Three separate host vars are required because Logstash's ${VAR} substitution is scalar —
# a comma-separated list in a single var produces one quoted string, not a list.
# When unset, all three default to localhost:9200 (single-node / staging behavior preserved).
output {
  elasticsearch {
    hosts => ["${LS_ES_HOST_1:localhost:9200}", "${LS_ES_HOST_2:localhost:9200}", "${LS_ES_HOST_3:localhost:9200}"]
    ilm_enabled => false
    ecs_compatibility => "disabled"
  }
  #stdout { codec => rubydebug }
}
